services:
  - type: web
    name: ascend-backend
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://ascend.vercel.app
      - key: ZITE_GEMINI_API_KEY
        sync: false
      - key: ZITE_RAZORPAY_KEY_ID
        sync: false
      - key: ZITE_RAZORPAY_KEY_SECRET
        sync: false
